services:
  postgres:
    image: ${KILN_POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: kiln
      POSTGRES_USER: kiln
      POSTGRES_PASSWORD: kiln
    ports:
      - "127.0.0.1:${KILN_POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiln -d kiln"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${KILN_REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${KILN_REDIS_PORT:-56379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${KILN_MINIO_IMAGE:-quay.io/minio/minio:latest}
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${KILN_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${KILN_S3_SECRET_ACCESS_KEY}
    ports:
      - "127.0.0.1:${KILN_MINIO_API_PORT:-59000}:9000"
      - "127.0.0.1:${KILN_MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: ${KILN_MINIO_MC_IMAGE:-quay.io/minio/mc:latest}
    depends_on:
      - minio
    environment:
      KILN_S3_BUCKET: ${KILN_S3_BUCKET}
      KILN_S3_ACCESS_KEY_ID: ${KILN_S3_ACCESS_KEY_ID}
      KILN_S3_SECRET_ACCESS_KEY: ${KILN_S3_SECRET_ACCESS_KEY}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$KILN_S3_ACCESS_KEY_ID" "$$KILN_S3_SECRET_ACCESS_KEY"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$$KILN_S3_BUCKET"
        mc anonymous set none "local/$$KILN_S3_BUCKET"

volumes:
  postgres-data:
  redis-data:
  minio-data:
